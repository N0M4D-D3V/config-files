font_family Fira Code
font_size 12.0

enable_ligatures always
disable_ligatures never

background_opacity 0.7

window_margin_width 0
window_padding_width 10 12 10 12

corner_radius 0

hide_window_decorations yes

tab_bar_style powerline
tab_bar_edge bottom 
tab_bar_background none

cursor_shape underline
cursor_underline_thickness 2.0

tab_bar_edge top
tab_bar_style powerline

allow_remote_control yes

#|                |
#|    MAPPINGS    |
#|                |

map ctrl+shift+enter new_window

map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

map ctrl+shift+enter launch --location=hsplit --cwd=last_reported

# Fixing some behavior on Linux
map enter send_text all \r
map kp_enter send_text all \r
map backspace send_text all \x7f
map tab send_text all \t
map shift+tab send_text all \x1b[Z
